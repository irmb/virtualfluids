# runs the neutral test case from Wu and Porte-Agel 217, DOI: 10.3390/en10122164
# Recreates Wu and Porte-Agel, 2017, no farm case
##################################################
#informations for Writing
##################################################
Path = Berg2020/GridB/output
##################################################
#informations for reading
##################################################
GridPath = .
##################################################
NumberOfDevices = 2
Devices = 0
##################################################
tStartOut           = 0
tOut                = 3600
tEnd                = 122500.0 
##################################################
tStartSampling      = 0
tStartTmpAveraging  = 93500
tSampling           = 100
tStartOutProbe      = 0
tOutProbe           = 1700
##################################################
L_x = 2560
L_y = 2560
L_z = 896
BoundaryLayerHeight = 700
nz = 100

##################################################
TurbulenceModel = AMDStratified
TurbulenceModelAdvectionDiffusion = AMDStratified
SGSconstant = 0.3333
TurbulentPrandtlNumber = 0.7
QuadricLimiterP = 100000.0
QuadricLimiterM = 100000.0
QuadricLimiterD = 100000.0
##################################################
InitialVelocityProfile = Constant
InitialTemperatureProfile = ConstantLapseRate
SurfaceTemperature = 290
ReferenceTemperature = 291.5
GeostrophicWindSpeed = 5
GeostrophicWindDirection = 0
LapseRate = 3
FrictionVelocity = 0.23
RoughnessLength = 0.05
CoriolisParameter = 1.e-4
UseRayleighDamping = false
DampingFactor = 1e-2 # for Rayleigh damping
# DampingFactor = 1e5 for Diffusion Layer
SurfaceHeatFlux = 0.0
UseHeatFlux = true

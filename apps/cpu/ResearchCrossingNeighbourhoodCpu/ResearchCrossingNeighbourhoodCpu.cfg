#set your output path here
path = ./output/ResearchCrossingNeighbourhoodCpu

# Geometry files are read from the paths below.
CityFilename     = external/geometry/data/Stadtmodell_cleaned_V01.stl
BodenFilename    = external/geometry/data/boden_solid_closed_loft.stl

# Grid cube extents (coordinates after geometry translation).
GridCubeMin = -2.6875 -9 -10.02845
GridCubeMax = 1145.3125 1051 156.481552

# Block length in nodes (x y z).
blocknx = 41 10 83

Re = 1000.0
# Flow parameters
velocity = .05 
deltaX = 2

# Fast-winding solid classification threshold (CPU), after winding normalization by 1/(4*pi).
# Default 0.5 is a balanced inside/outside split for a closed, well-oriented mesh.
# Lower values mark more nodes as solid. Higher values mark fewer nodes as solid.
FastWindingThreshold = 0.5

# Fast-winding accuracyScale and tolerance are currently fixed in code for this app.
# accuracyScale = 2.0 : higher is usually faster, lower is usually more exact.
# tolerance = 1.0e-4 : protects against numeric noise near the surface.

timeStepOut = 500
timeStepEnd = 10000

# Number of OpenMP threads
numOfThreads = 4
